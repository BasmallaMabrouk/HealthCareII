<div class="layout-container">
  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="sidebar-header">
      <div class="logo">
        <span class="logo-icon">DT</span>
        DocTime
      </div>
    </div>
    
    <nav class="nav-menu">
      @for (item of navItems; track item.path) {
        <a [routerLink]="item.path" 
           routerLinkActive="active"
           class="nav-item">
          <span class="material-icons">{{ item.icon }}</span>
          <span>{{ item.label }}</span>
        </a>
      }
    </nav>

    <div class="sidebar-footer">


      <button class="btn logout-btn" (click)="logout()">
        <span class="material-icons">logout</span>
        <span>Logout</span>
      </button>
    </div>
  </aside>

  <!-- Main Content -->
  <main class="main-content">
    <!-- Topbar -->
    <header class="topbar">
      <div class="topbar-left">
        <h2 class="page-title">Doctor Portal</h2>
      </div>
      
      <div class="topbar-right">
        <button class="btn-icon">
          <span class="material-icons">notifications</span>
        </button>
        <div class="user-profile">
          <div class="user-info">
            <p class="user-name">{{ doctor?.name || '...' }}</p>
            <p class="user-role">{{ doctor?.specialization || '...' }}</p>
          </div>
          <!-- Avatar بالـ initials بدل صورة خارجية -->
          <div class="avatar-initials">
            {{ getInitials(doctor?.name || '') }}
          </div>
        </div>
      </div>
    </header>

    <!-- Content Area -->
    <div class="content-area">
      <router-outlet></router-outlet>
    </div>
  </main>
</div>
