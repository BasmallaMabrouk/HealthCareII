<div class="login-container">
  <div class="login-header">
    <h2>Reset Password</h2>
    <p>Enter your account email and choose a new password.</p>
  </div>

  <form [formGroup]="resetForm" (ngSubmit)="onSubmit()" class="login-form">
    <div *ngIf="successMsg" class="alert-success">{{ successMsg }}</div>
    <div *ngIf="errorMsg" class="alert-error">{{ errorMsg }}</div>

    <!-- Username (Email) -->
    <div class="input-group">
      <label>Email Address (Username)</label>
      <input type="email" formControlName="username" placeholder="name@example.com"
        [class.error-input]="resetForm.get('username')?.invalid && resetForm.get('username')?.touched">
      <span class="error-msg"
        *ngIf="resetForm.get('username')?.invalid && resetForm.get('username')?.touched">
        <ng-container *ngIf="resetForm.get('username')?.errors?.['required']">Email is required.</ng-container>
        <ng-container *ngIf="resetForm.get('username')?.errors?.['email']">Please enter a valid email address.</ng-container>
      </span>
    </div>

    <!-- New Password -->
    <div class="input-group">
      <label>New Password</label>
      <input type="password" formControlName="newPassword" placeholder="••••••••"
        [class.error-input]="resetForm.get('newPassword')?.invalid && resetForm.get('newPassword')?.touched">
      <span class="error-msg"
        *ngIf="resetForm.get('newPassword')?.invalid && resetForm.get('newPassword')?.touched">
        <ng-container *ngIf="resetForm.get('newPassword')?.errors?.['required']">New password is required.</ng-container>
        <ng-container *ngIf="resetForm.get('newPassword')?.errors?.['minlength']">Password must be at least 6 characters.</ng-container>
      </span>
    </div>

    <!-- Confirm Password -->
    <div class="input-group">
      <label>Confirm New Password</label>
      <input type="password" formControlName="confirmPassword" placeholder="••••••••"
        [class.error-input]="resetForm.get('confirmPassword')?.touched && resetForm.errors?.['mismatch']">
      <span class="error-msg"
        *ngIf="resetForm.get('confirmPassword')?.touched && resetForm.errors?.['mismatch']">
        Passwords do not match.
      </span>
    </div>

    <button type="submit" class="btn-login" [disabled]="resetForm.invalid || isLoading">
      {{ isLoading ? 'Updating...' : 'Reset Password' }}
    </button>

    <div class="auth-footer">
      <p><a [routerLink]="['/auth/login']">Back to Login</a></p>
    </div>
  </form>
</div>
